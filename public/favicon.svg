<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo pixel art retro -->
  <rect width="32" height="32" fill="#5c94fc"/>
  
  <!-- Borde pixelado -->
  <rect x="2" y="2" width="28" height="28" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Letra C estilo pixel -->
  <rect x="6" y="6" width="20" height="4" fill="#ffffff"/>
  <rect x="6" y="6" width="4" height="20" fill="#ffffff"/>
  <rect x="6" y="22" width="20" height="4" fill="#ffffff"/>
  
  <!-- Detalle de precio/pixel -->
  <rect x="22" y="10" width="4" height="4" fill="#ff0055"/>
  <rect x="22" y="18" width="4" height="4" fill="#00ffaa"/>
</svg>
