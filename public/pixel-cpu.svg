<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="100%" height="100%" shape-rendering="crispEdges">
  <!-- Fondo del chip -->
  <rect x="2" y="2" width="12" height="12" fill="#2a2a2a" />
  
  <!-- Pines superiores -->
  <rect x="3" y="1" width="1" height="1" fill="#ffcc00" />
  <rect x="5" y="1" width="1" height="1" fill="#ffcc00" />
  <rect x="7" y="1" width="1" height="1" fill="#ffcc00" />
  <rect x="9" y="1" width="1" height="1" fill="#ffcc00" />
  <rect x="11" y="1" width="1" height="1" fill="#ffcc00" />
  <rect x="13" y="1" width="1" height="1" fill="#ffcc00" />

  <!-- Pines inferiores -->
  <rect x="3" y="14" width="1" height="1" fill="#ffcc00" />
  <rect x="5" y="14" width="1" height="1" fill="#ffcc00" />
  <rect x="7" y="14" width="1" height="1" fill="#ffcc00" />
  <rect x="9" y="14" width="1" height="1" fill="#ffcc00" />
  <rect x="11" y="14" width="1" height="1" fill="#ffcc00" />
  <rect x="13" y="14" width="1" height="1" fill="#ffcc00" />

  <!-- Pines izquierdos -->
  <rect x="1" y="3" width="1" height="1" fill="#ffcc00" />
  <rect x="1" y="5" width="1" height="1" fill="#ffcc00" />
  <rect x="1" y="7" width="1" height="1" fill="#ffcc00" />
  <rect x="1" y="9" width="1" height="1" fill="#ffcc00" />
  <rect x="1" y="11" width="1" height="1" fill="#ffcc00" />
  <rect x="1" y="13" width="1" height="1" fill="#ffcc00" />

  <!-- Pines derechos -->
  <rect x="14" y="3" width="1" height="1" fill="#ffcc00" />
  <rect x="14" y="5" width="1" height="1" fill="#ffcc00" />
  <rect x="14" y="7" width="1" height="1" fill="#ffcc00" />
  <rect x="14" y="9" width="1" height="1" fill="#ffcc00" />
  <rect x="14" y="11" width="1" height="1" fill="#ffcc00" />
  <rect x="14" y="13" width="1" height="1" fill="#ffcc00" />

  <!-- Centro del CPU -->
  <rect x="4" y="4" width="8" height="8" fill="#555555" />
  <rect x="5" y="5" width="6" height="6" fill="#00ffaa" />
  <rect x="6" y="6" width="4" height="4" fill="#ffffff" />
  
  <!-- Detalles -->
  <rect x="11" y="4" width="1" height="1" fill="#ff0055" />
</svg>